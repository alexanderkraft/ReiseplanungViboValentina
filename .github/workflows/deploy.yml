name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Inject API keys
        run: |
          cat > js/config.js << 'SCRIPT'
          window.GEOAPIFY_API_KEY = '${{ secrets.GEOAPIFY_API_KEY }}';
          SCRIPT

      - name: Inject version info
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          cat > js/version.js << SCRIPT
          window.APP_VERSION = {
            branch: '${{ github.ref_name }}',
            commit: '${SHORT_SHA}',
            buildDate: '$(date -u +%Y-%m-%dT%H:%M:%SZ)'
          };
          SCRIPT

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
