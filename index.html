<!DOCTYPE html>
<html lang="de" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reiseplaner - Frankfurt nach Sant'Agata di Esaro</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<header>
  <h1><i class="fas fa-map-marked-alt"></i> Reiseplaner</h1>
  <div class="header-actions">
    <button id="themeToggle" class="theme-toggle">
      <i class="fas fa-moon"></i> Dark Mode
    </button>
    <button id="trafficToggle" class="traffic-toggle">
      <i class="fas fa-traffic-light"></i> Traffic
    </button>
    <button id="sidebarToggle" class="sidebar-toggle">
      <i class="fas fa-layer-group"></i> Stops
    </button>
  </div>
</header>

<div class="container">

  <!-- Input Section -->
  <section class="input-section">
    <div class="input-group">
      <label><i class="fas fa-play"></i> Start</label>
      <input type="text" id="startInput" value="Frankfurt" readonly>
    </div>
    <div class="input-group">
      <label><i class="fas fa-flag-checkered"></i> Ziel</label>
      <input type="text" id="zielInput" value="Sant'Agata di Esaro" readonly>
    </div>
    <div class="input-group">
      <label><i class="fas fa-calendar"></i> Datum</label>
      <input type="date" id="dateInput" value="2026-08-13">
    </div>
    <div class="input-group">
      <label><i class="fas fa-users"></i> Personen</label>
      <input type="number" id="personenInput" value="2" min="1" max="10">
    </div>
    <button id="calculateBtn" class="btn">
      <i class="fas fa-calculator"></i> Berechnen
    </button>
  </section>

  <!-- Info Banner -->
  <div id="infoBanner" class="info-banner" style="display:none">
    <span id="bannerText"></span>
  </div>

  <!-- Map + Budget -->
  <section class="main-content">
    <div>
      <div id="map"></div>

      <!-- Etappen -->
      <div class="etappen-section">
        <h2><i class="fas fa-route"></i> Etappen</h2>
        <div id="etappenGrid" class="etappen-grid"></div>
      </div>
    </div>

    <!-- Budget Panel -->
    <aside class="budget-panel">
      <h2><i class="fas fa-wallet"></i> Budget-Rechner</h2>

      <div class="budget-input">
        <label>Benzinpreis (EUR/L)</label>
        <input type="number" id="fuelPrice" value="1.65" step="0.01" min="0.50" max="5.00">
      </div>
      <div class="budget-input">
        <label>Verbrauch (L/100km)</label>
        <input type="number" id="fuelConsumption" value="7" step="0.5" min="3" max="20">
      </div>
      <div class="budget-input">
        <label>Hotel (EUR/Nacht)</label>
        <input type="number" id="hotelPrice" value="175" step="5" min="30" max="500">
      </div>

      <div class="budget-item">
        <span><i class="fas fa-road"></i> Maut</span>
        <span id="budgetMaut">EUR 180</span>
      </div>
      <div class="budget-item">
        <span><i class="fas fa-gas-pump"></i> Benzin</span>
        <span id="budgetBenzin">EUR 280</span>
      </div>
      <div class="budget-item">
        <span><i class="fas fa-hotel"></i> Hotels (2 Naechte)</span>
        <span id="budgetHotels">EUR 350</span>
      </div>
      <div id="budgetExtras"></div>

      <div class="budget-total">
        <span>Gesamt</span>
        <span id="budgetTotal">EUR 810</span>
      </div>
      <div class="budget-item" style="border:none;opacity:0.7;font-size:0.85rem">
        <span></span>
        <span id="budgetPerPerson">EUR 405 pro Person</span>
      </div>
    </aside>
  </section>

</div>

<!-- Interactive Sidebar -->
<aside class="interactive-aside" id="sidebar">
  <div class="sidebar-header">
    <h2><i class="fas fa-layer-group"></i> Stops auswaehlen</h2>
    <button id="sidebarClose" class="sidebar-close"><i class="fas fa-times"></i></button>
  </div>
  <div class="overlay-tabs">
    <button class="overlay-tab active" data-tab="hotels"><i class="fas fa-hotel"></i> Hotels</button>
    <button class="overlay-tab" data-tab="tankstellen"><i class="fas fa-gas-pump"></i> Tanken</button>
    <button class="overlay-tab" data-tab="pausen"><i class="fas fa-coffee"></i> Pausen</button>
  </div>
  <div id="overlayContent"></div>
  <div class="sidebar-actions">
    <button id="saveRouteBtn" class="btn" style="width:100%;margin-bottom:0.5rem">
      <i class="fas fa-save"></i> Route speichern
    </button>
    <button id="exportJsonBtn" class="btn export-btn" style="width:100%">
      <i class="fas fa-download"></i> Als JSON downloaden
    </button>
  </div>
</aside>
<div id="sidebarOverlay" class="sidebar-overlay"></div>

<footer>
  <button id="exportBtn" class="export-btn">
    <i class="fas fa-file-export"></i> Export als CSV
  </button>
  <p style="margin-top:1rem;opacity:0.6;font-size:0.85rem">
    Reiseplaner v2.0 | Frankfurt - Sant'Agata di Esaro | 13.08.2026
  </p>
</footer>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.js"></script>
<script src="js/app.js"></script>
</body>
</html>
